        function showCardModal(title, qVal, aVal) {
            const modalDiv = document.createElement('div'); modalDiv.className = 'modal';
            modalDiv.innerHTML = `<div class="modal-content"><h3>${title}</h3><div class="form-group"><label>题目</label><input id="modalQuestion" value="${escapeHtml(qVal)}"></div><div class="form-group"><label>答案 (Markdown)</label><textarea id="modalAnswer" rows="6">${escapeHtml(aVal)}</textarea></div><div style="display:flex; gap:12px; justify-content:end;"><button id="modalCancel">取消</button><button id="modalSave" class="btn-primary">保存</button></div></div>`;
            document.body.appendChild(modalDiv); modalDiv.style.display = 'flex';
            const close = () => { if (modalDiv && modalDiv.parentNode) modalDiv.parentNode.removeChild(modalDiv); };
            document.getElementById('modalCancel').onclick = close;
            document.getElementById('modalSave').onclick = (e) => {
                e.stopPropagation();
                const questionInput = document.getElementById('modalQuestion');
                const answerInput = document.getElementById('modalAnswer');
                if (questionInput && answerInput) {
                    const newQ = questionInput.value.trim();
                    const newA = answerInput.value;
                    if (!newQ) { showToast("题目不能为空", true); return; }
                    if (currentEditCardId === null) addCard(newQ, newA);
                    else updateCard(currentEditCardId, newQ, newA);
                    close();
                }
            };
        }

        function bindToolbarEvents() {
            document.getElementById('addCardBtn')?.addEventListener('click', () => openCardAddModal());
            document.getElementById('downloadTemplateBtn')?.addEventListener('click', downloadTemplate);
            document.getElementById('importExcelBtn')?.addEventListener('click', triggerImport);
            document.getElementById('exportExcelBtn')?.addEventListener('click', exportGroupExcel);
            document.getElementById('loadJsonBtn')?.addEventListener('click', loadJsonFromFile);
            document.getElementById('exportJsonBtn')?.addEventListener('click', exportToJson);
            document.getElementById('startStudyBtn')?.addEventListener('click', () => {
                const groupCards = getCardsByGroup(currentGroupId);
                if (!groupCards.length) { showToast("当前卡组无卡片，请先添加", true); return; }
                let startCard = null;
                const unmastered = getUnmasteredCards(currentGroupId);
                if (unmastered.length) startCard = unmastered[0];
                else startCard = groupCards[0];
                if (startCard) startStudyModeWithCard(startCard);
            });
        }

        function bindSearchEvents() {
            const groupSearchInput = document.getElementById('groupSearchInput');
            if (groupSearchInput) groupSearchInput.addEventListener('input', (e) => { groupSearchKeyword = e.target.value; renderGroupsSidebar(); });
            const cardSearchInput = document.getElementById('cardSearchInput');
            if (cardSearchInput) cardSearchInput.addEventListener('input', (e) => { cardSearchKeyword = e.target.value; renderCardsOfGroup(); });
        }

        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function (m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }

        // 侧边栏切换功能（电脑端折叠，移动端滑出）
        function initSidebarToggle() {
            const toggleBtn = document.getElementById('toggleSidebarBtn');
            const closeBtn = document.getElementById('closeSidebarBtn');
            const mainContent = document.getElementById('mainContent');
            const appLayout = document.getElementById('appLayout');
            
            if (!toggleBtn || !mainContent || !appLayout) return;
            
            function toggleSidebar() {
                const isMobile = window.innerWidth <= 768;
                if (isMobile) {
                    appLayout.classList.toggle('sidebar-visible');
                } else {
                    appLayout.classList.toggle('sidebar-collapsed');
                }
            }
            
            function closeSidebar() {
                const isMobile = window.innerWidth <= 768;
                if (isMobile) {
                    appLayout.classList.remove('sidebar-visible');
                } else {
                    appLayout.classList.remove('sidebar-collapsed');
                }
            }
            
            function resetSidebarState() {
                const isMobile = window.innerWidth <= 768;
                if (isMobile) {
                    appLayout.classList.remove('sidebar-collapsed');
                } else {
                    appLayout.classList.remove('sidebar-visible');
                }
            }
            
            toggleBtn.addEventListener('click', toggleSidebar);
            if (closeBtn) {
                closeBtn.addEventListener('click', closeSidebar);
            }
            
            mainContent.addEventListener('click', (e) => {
                const isMobile = window.innerWidth <= 768;
                if (isMobile && appLayout.classList.contains('sidebar-visible')) {
                    if (!e.target.closest('.groups-sidebar') && !e.target.closest('.toggle-sidebar-btn')) {
                        closeSidebar();
                    }
                }
            });
            
            window.addEventListener('resize', () => {
                resetSidebarState();
            });
            
            resetSidebarState();
        }

        async function init() {
            initMarkdown();
            await loadData();
            renderGroupsSidebar();
            renderReviewFixed();
            bindToolbarEvents();
            bindSearchEvents();
            document.getElementById('newSubjectBtn').addEventListener('click', () => openEditSubjectModal(null, ''));
            initSidebarToggle();
        }
        init();
    </script>
</body>

</html>
